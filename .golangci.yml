version: "2"

run:
  concurrency: 4
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Correctness
    - govet
    - staticcheck   # includes gosimple in v2
    - errcheck
    - ineffassign
    - unused

    # Security
    - gosec

    # Code quality
    - revive
    - misspell

    # HTTP / concurrency
    - bodyclose
    - noctx
    - copyloopvar

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    staticcheck:
      checks:
        - all

    errcheck:
      check-type-assertions: true
      check-blank: false

    gosec:
      severity: medium
      confidence: medium

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
          arguments:
            - allowRegex: "^_"

    misspell:
      locale: US

  exclusions:
    rules:
      # MD5 in anonymizer is for deterministic PII tokens, not cryptographic use
      - path: internal/anonymizer/anonymizer\.go
        linters:
          - gosec
        text: "G401|G501|MD5"

      # select{} in singleConnListener is the intended design to block until close
      - path: internal/mitm/mitm\.go
        linters:
          - staticcheck
        text: "SA1000|empty branch"

      # G704 (SSRF taint) fires on every test HTTP probe whose transport or
      # URL involves a runtime-bound localhost port — inherent to testing
      # dynamically bound listeners, where the port cannot be a constant.
      # Declared here once for test files (maintainer decision, PR #142
      # review) instead of per-site #nosec. Production code stays fully
      # scanned: this rule matches _test.go only, and the standalone gosec
      # run in `make security` does not scan test files at all.
      - path: _test\.go$
        linters:
          - gosec
        text: "G704"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
