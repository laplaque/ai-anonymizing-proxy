name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history required so delta-coverage.sh can resolve the merge
          # base against origin/main. Without this, git diff exits non-zero
          # and the delta gate fails loudly (see delta-coverage.sh).
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage
        run: go tool cover -func=coverage.out

      - name: Delta coverage check
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=50
          bash .github/scripts/delta-coverage.sh coverage.out 95.0 origin/main

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          BENCHMARK_GIST_TOKEN: ${{ secrets.BENCHMARK_GIST_TOKEN }}
        run: |
          bash .github/scripts/update-coverage-gist.sh coverage.out 0fcf197a0e717817dbeb34d146db423e

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.28.0
          make security

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, security, benchmark]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: go build -ldflags="-s -w" -o bin/proxy ./cmd/proxy

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proxy-binary
          path: bin/proxy

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: |
          mkdir -p .tmp
          go test -run='^$' -bench=. -benchmem -benchtime=1s -count=1 \
            ./internal/anonymizer/... 2>.tmp/benchmark-stderr.txt | tee .tmp/benchmark-ci.txt

      - name: Check benchmark thresholds
        run: |
          #!/bin/bash
          set -e

          # Thresholds based on 500ms baseline:
          # - regex/cache-hit: < 0.5% = 2.5ms = 2,500,000 ns
          # - streaming: < 4% = 20ms = 20,000,000 ns
          REGEX_CACHE_THRESHOLD=2500000
          STREAMING_THRESHOLD=20000000

          failed=0

          echo "=== Benchmark Threshold Check ==="
          echo "Regex/Cache-hit budget: ${REGEX_CACHE_THRESHOLD} ns (2.5ms)"
          echo "Streaming budget: ${STREAMING_THRESHOLD} ns (20ms)"
          echo ""

          # Parse benchmark results and check thresholds
          while IFS= read -r line; do
            # Match benchmark lines: BenchmarkName-N <iterations> <ns/op> ns/op ...
            if [[ $line =~ ^(Benchmark[A-Za-z]+)-[0-9]+[[:space:]]+[0-9]+[[:space:]]+([0-9]+) ]]; then
              name="${BASH_REMATCH[1]}"
              ns_op="${BASH_REMATCH[2]}"

              # Determine threshold based on benchmark type
              case "$name" in
                BenchmarkRegexPass*|BenchmarkAnonymizeCache*|BenchmarkTokenGeneration)
                  threshold=$REGEX_CACHE_THRESHOLD
                  category="regex/cache"
                  ;;
                BenchmarkStreaming*)
                  threshold=$STREAMING_THRESHOLD
                  category="streaming"
                  ;;
                *)
                  # Other benchmarks use regex/cache threshold
                  threshold=$REGEX_CACHE_THRESHOLD
                  category="general"
                  ;;
              esac

              if [ "$ns_op" -gt "$threshold" ]; then
                echo "FAIL: $name = ${ns_op} ns/op (budget: ${threshold} ns, category: ${category})"
                failed=1
              else
                echo "PASS: $name = ${ns_op} ns/op (budget: ${threshold} ns)"
              fi
            fi
          done < .tmp/benchmark-ci.txt

          echo ""
          if [ "$failed" -eq 1 ]; then
            echo "ERROR: One or more benchmarks exceeded their latency budget!"
            exit 1
          else
            echo "SUCCESS: All benchmarks within latency budgets."
          fi

      - name: Post benchmark comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x .github/scripts/benchmark-comment.sh
          COMMENT="$(.github/scripts/benchmark-comment.sh .tmp/benchmark-ci.txt)"
          EXISTING=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("## Benchmark results")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/"$EXISTING" \
              -X PATCH -f body="$COMMENT"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
          fi

      - name: Update benchmark badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          BENCHMARK_GIST_TOKEN: ${{ secrets.BENCHMARK_GIST_TOKEN }}
        run: |
          chmod +x .github/scripts/update-benchmark-gist.sh
          .github/scripts/update-benchmark-gist.sh .tmp/benchmark-ci.txt 0fcf197a0e717817dbeb34d146db423e

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: benchmark-results
          path: .tmp/benchmark-ci.txt
